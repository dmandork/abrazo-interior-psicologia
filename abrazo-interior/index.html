<body class="bg-white text-gray-800">

  <!-- Sobre mí, Servicios, Quick Contacto sections are unchanged – omitted here for brevity but they are identical to previous version -->

  <!-- Contact Form (now points to custom success page) -->
  <section id="formulario" class="max-w-6xl mx-auto px-6 py-20 bg-white">
    <div class="max-w-2xl mx-auto">
      <h2 class="heading text-4xl font-bold text-center mb-8">Envíame un mensaje</h2>
      <p class="text-center text-gray-600 mb-10">Completa el formulario y te responderé lo antes posible.</p>

      <form name="contacto" method="POST" action="/gracias.html" data-netlify="true" class="space-y-6">
        <input type="hidden" name="form-name" value="contacto">

        <div>
          <label for="nombre" class="block text-sm font-medium mb-1">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" required class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:border-emerald-600">
        </div>

        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label for="email" class="block text-sm font-medium mb-1">Correo electrónico</label>
            <input type="email" id="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:border-emerald-600">
          </div>
          <div>
            <label for="telefono" class="block text-sm font-medium mb-1">Número de WhatsApp / Teléfono</label>
            <input type="tel" id="telefono" name="telefono" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:border-emerald-600">
          </div>
        </div>

        <div>
          <label for="servicio" class="block text-sm font-medium mb-1">Tipo de servicio</label>
          <select id="servicio" name="servicio" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:border-emerald-600">
            <option value="">Selecciona una opción...</option>
            <option value="Terapia Individual">Terapia Individual</option>
            <option value="Terapia de Pareja">Terapia de Pareja</option>
            <option value="Adolescentes">Adolescentes</option>
            <option value="Orientación Vocacional">Orientación Vocacional</option>
            <option value="Psicología Organizacional">Psicología Organizacional</option>
            <option value="Psicología Educativa">Psicología Educativa</option>
            <option value="Otro">Otro</option>
          </select>
        </div>

        <div>
          <label for="horarios" class="block text-sm font-medium mb-1">Días y horarios preferidos</label>
          <textarea id="horarios" name="horarios" rows="2" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:border-emerald-600" placeholder="Ej: Martes o jueves por la tarde"></textarea>
        </div>

        <div>
          <label for="mensaje" class="block text-sm font-medium mb-1">Mensaje / Motivo de consulta</label>
          <textarea id="mensaje" name="mensaje" rows="5" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:border-emerald-600" placeholder="Cuéntame brevemente cómo puedo ayudarte"></textarea>
        </div>

        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-5 text-xl font-medium rounded-3xl transition">
          Enviar mensaje
        </button>
      </form>
    </div>
  </section>
